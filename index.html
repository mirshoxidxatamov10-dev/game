<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Tic-Tac-Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0c0c0e;
            color: #ffffff;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cell {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cell:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
        }

        .cell:active:not(:disabled) {
            transform: scale(0.98);
        }

        .x-symbol {
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }

        .o-symbol {
            color: #f87171;
            text-shadow: 0 0 20px rgba(248, 113, 113, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-sm">
        <!-- Main Menu -->
        <div id="menu" class="glass p-8 rounded-3xl space-y-6 animate-fade-in">
            <div class="text-center space-y-2">
                <h1 class="text-3xl font-semibold tracking-tight">Tic-Tac-Toe</h1>
                <p class="text-white/40 text-sm">Enter a code or create a new room</p>
            </div>

            <div class="space-y-4">
                <button onclick="createRoom()" class="w-full py-4 bg-white text-black font-semibold rounded-2xl hover:bg-white/90 transition-colors active:scale-95 duration-200">
                    Create Room
                </button>
                
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-white/10"></div>
                    <span class="flex-shrink mx-4 text-white/20 text-xs uppercase tracking-widest">Or</span>
                    <div class="flex-grow border-t border-white/10"></div>
                </div>

                <div class="space-y-3">
                    <input type="text" id="roomInput" maxlength="6" placeholder="Enter 6-digit code" 
                           class="w-full py-4 px-6 bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:border-white/30 transition-colors text-center text-lg tracking-widest placeholder:text-white/20">
                    <button onclick="joinRoom()" class="w-full py-4 bg-white/10 hover:bg-white/15 font-semibold rounded-2xl transition-all active:scale-95 duration-200">
                        Join Room
                    </button>
                </div>
            </div>
        </div>

        <!-- Room Lobby / Game View -->
        <div id="game" class="hidden animate-fade-in">
            <div class="mb-6 flex justify-between items-center px-2">
                <div id="roomDisplay" class="text-xs font-mono text-white/40 uppercase tracking-widest">Room: ------</div>
                <div id="statusLabel" class="text-xs font-semibold px-3 py-1 bg-white/10 rounded-full text-white/60">Waiting...</div>
            </div>

            <div id="board" class="glass p-2 rounded-[2rem] grid grid-cols-3 gap-2 aspect-square mb-6">
                <!-- 9 cells -->
                <button onclick="makeMove(0)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(1)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(2)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(3)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(4)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(5)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(6)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(7)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
                <button onclick="makeMove(8)" class="cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold"></button>
            </div>

            <div class="space-y-4 text-center">
                <button id="resetBtn" onclick="resetGame()" class="hidden w-full py-4 bg-white text-black font-semibold rounded-2xl hover:bg-white/90 transition-colors active:scale-95 duration-200">
                    Play Again
                </button>
                <button onclick="location.reload()" class="text-white/20 hover:text-white/40 text-sm transition-colors block w-full px-4">Exit and Leave Room</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let mySymbol = null;
        let myTurn = false;

        const menuDiv = document.getElementById('menu');
        const gameDiv = document.getElementById('game');
        const boardCells = document.querySelectorAll('.cell');
        const statusLabel = document.getElementById('statusLabel');
        const roomDisplay = document.getElementById('roomDisplay');
        const resetBtn = document.getElementById('resetBtn');

        function createRoom() {
            socket.emit('createRoom');
        }

        function joinRoom() {
            const code = document.getElementById('roomInput').value;
            if (code.length === 6) {
                socket.emit('joinRoom', code);
            } else {
                alert('Iltimos, 6 xonali kodni kiriting');
            }
        }

        function makeMove(index) {
            if (!myTurn) return;
            socket.emit('makeMove', { roomCode: currentRoom, index });
        }

        function resetGame() {
            socket.emit('resetGame', currentRoom);
            resetBtn.classList.add('hidden');
        }

        socket.on('roomCreated', (code) => {
            currentRoom = code;
            roomDisplay.innerText = `Room: ${code}`;
            showGame();
            statusLabel.innerText = 'Raqibni kutyapmiz...';
        });

        socket.on('playerSymbol', (symbol) => {
            mySymbol = symbol;
        });

        socket.on('gameStart', ({ board, turn }) => {
            currentRoom = currentRoom || document.getElementById('roomInput').value;
            roomDisplay.innerText = `Room: ${currentRoom}`;
            showGame();
            resetBtn.classList.add('hidden');
            updateBoard(board);
            setTurn(turn === socket.id);
        });

        socket.on('gameUpdate', ({ board, turn }) => {
            updateBoard(board);
            setTurn(turn === socket.id);
        });

        socket.on('gameOver', ({ board, winner }) => {
            updateBoard(board);
            myTurn = false;
            resetBtn.classList.remove('hidden');
            
            if (winner === 'draw') {
                statusLabel.innerText = "Durang!";
                statusLabel.className = 'text-xs font-semibold px-3 py-1 bg-white/20 rounded-full text-white/80';
            } else if (winner === socket.id) {
                statusLabel.innerText = 'Siz yutdingiz!';
                statusLabel.className = 'text-xs font-semibold px-3 py-1 bg-green-500/20 rounded-full text-green-400';
            } else {
                statusLabel.innerText = 'Siz yutqazdingiz!';
                statusLabel.className = 'text-xs font-semibold px-3 py-1 bg-red-500/20 rounded-full text-red-400';
            }
        });

        socket.on('opponentLeft', () => {
            alert('Raqib xonani tark etdi');
            location.reload();
        });

        socket.on('error', (msg) => {
            alert(msg);
        });

        function showGame() {
            menuDiv.classList.add('hidden');
            gameDiv.classList.remove('hidden');
        }

        function updateBoard(board) {
            board.forEach((cell, i) => {
                const btn = boardCells[i];
                btn.className = 'cell h-full w-full rounded-2xl glass flex items-center justify-center text-4xl font-bold';
                if (cell) {
                    btn.innerText = cell;
                    btn.classList.add(cell === 'X' ? 'x-symbol' : 'o-symbol');
                    btn.disabled = true;
                } else {
                    btn.innerText = '';
                    btn.disabled = !myTurn;
                }
            });
        }

        function setTurn(isMyTurn) {
            myTurn = isMyTurn;
            statusLabel.innerText = isMyTurn ? 'Sizning navbatingiz' : "Raqib navbati";
            statusLabel.className = isMyTurn 
                ? 'text-xs font-semibold px-3 py-1 bg-blue-500/20 rounded-full text-blue-400 animate-pulse'
                : 'text-xs font-semibold px-3 py-1 bg-white/10 rounded-full text-white/40';
            
            boardCells.forEach(btn => {
                if (btn.innerText === '') {
                    btn.disabled = !isMyTurn;
                }
            });
        }
    </script>
</body>
</html>
